<!DOCTYPE html>
<html>
<head>
  <title>Chat App</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: white;
    }

    .chat-container {
      width: 350px;
      height: 500px;
      background: #1e293b;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .header {
      padding: 10px;
      text-align: center;
      background: #334155;
    }

    .username {
      margin-top: 5px;
      padding: 6px;
      width: 60%;
      border-radius: 10px;
      border: none;
      text-align: center;
      background: #0f172a;
      color: white;
    }

    .messages {
      flex: 1;
      padding: 10px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .message {
      padding: 8px 12px;
      border-radius: 15px;
      margin: 5px 0;
      max-width: 75%;
    }

    .left {
      background: #475569;
      align-self: flex-start;
    }

    .right {
      background: #38bdf8;
      color: black;
      align-self: flex-end;
    }

    .input-area {
      display: flex;
      padding: 10px;
      background: #334155;
    }

    #messageInput {
      flex: 1;
      padding: 10px;
      border-radius: 15px;
      border: none;
      outline: none;
      background: #1e293b;
      color: white;
    }

    button {
      margin-left: 8px;
      padding: 10px 15px;
      border-radius: 15px;
      border: none;
      background: #38bdf8;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="chat-container">
  <div class="header">
    💬 Chat<br>
    <input id="username" class="username" placeholder="Your name">
  </div>

  <div id="messages" class="messages"></div>

  <div class="input-area">
    <input id="messageInput" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBb3zt9jrgr4cfW7AWrmvCAK_-wFVKfUt0",
    authDomain: "chat-dfa60.firebaseapp.com",
    projectId: "chat-dfa60",
    storageBucket: "chat-dfa60.firebasestorage.app",
    messagingSenderId: "977336784686",
    appId: "1:977336784686:web:272470c3f863d9b1f60cbf"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const messagesRef = collection(db, "messages");

  window.sendMessage = async function () {
    const user = document.getElementById("username").value.trim();
    const text = document.getElementById("messageInput").value.trim();

    if (!user) {
      alert("Enter your name");
      return;
    }

    if (!text) return;

    await addDoc(messagesRef, {
      user: user,
      text: text,
      time: Date.now()
    });

    document.getElementById("messageInput").value = "";
  };

  const q = query(messagesRef, orderBy("time"));

  onSnapshot(q, (snapshot) => {
    const container = document.getElementById("messages");
    container.innerHTML = "";

    const currentUser = document.getElementById("username").value;

    snapshot.forEach(doc => {
      const msg = doc.data();

      const div = document.createElement("div");
      div.className = "message " + (msg.user === currentUser ? "right" : "left");

      div.textContent = msg.user === currentUser
        ? msg.text
        : msg.user + ": " + msg.text;

      container.appendChild(div);
    });

    container.scrollTop = container.scrollHeight;
  });
</script>

</body>
</html>
